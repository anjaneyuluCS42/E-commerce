name: ShopHub CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint-and-test-backend:
    name: Backend Lint and Test
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: password
          POSTGRES_DB: shophub_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Backend/requirements*.txt'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r Backend/requirements.txt -r Backend/requirements-dev.txt

      - name: Run Black Code Quality Check
        run: |
          cd Backend
          black --check .

      - name: Run Flake8 Lint Check
        run: |
          cd Backend
          flake8 .

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql://postgres:password@localhost:5432/shophub_test
          SECRET_KEY: test_secret_key_for_github_actions_ci
          ALGORITHM: HS256
          REDIS_URL: redis://localhost:6379
          GROQ_API_KEY: fake_key_for_testing
          GEMINI_API_KEY: fake_key_for_testing
          MISTRAL_API_KEY: fake_key_for_testing
          ENVIRONMENT: development
          DEBUG: "True"
        run: |
          cd Backend
          pytest

  lint-and-test-frontend:
    name: Frontend Lint and Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: 'Frontend/package-lock.json'

      - name: Install Dependencies
        run: |
          cd Frontend
          npm ci

      - name: Run ESLint Checks
        run: |
          cd Frontend
          npm run lint

      - name: Run Vitest Unit Tests
        run: |
          cd Frontend
          npm run test

  build-and-push-docker:
    name: Docker Build & Push
    needs: [lint-and-test-backend, lint-and-test-frontend]
    runs-on: ubuntu-latest
    # Run on all PRs to verify the build, but push only on merges to main
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Extract Metadata (tags, labels) for Backend
        id: meta-backend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/shophub-backend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and Push Backend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Backend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shophub-backend:latest
            ${{ secrets.DOCKER_USERNAME }}/shophub-backend:${{ github.sha }}
          labels: ${{ steps.meta-backend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Extract Metadata (tags, labels) for Frontend
        id: meta-frontend
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/shophub-frontend
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and Push Frontend Docker Image
        uses: docker/build-push-action@v5
        with:
          context: ./Frontend
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: |
            ${{ secrets.DOCKER_USERNAME }}/shophub-frontend:latest
            ${{ secrets.DOCKER_USERNAME }}/shophub-frontend:${{ github.sha }}
          labels: ${{ steps.meta-frontend.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
