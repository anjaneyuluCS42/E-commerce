version: '3.8'

services:
  # ==========================================
  # Database Service (PostgreSQL 16)
  # ==========================================
  postgres:
    image: postgres:16-alpine
    container_name: ecommerce_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      # Named volume for database files persistence
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      # Use pg_isready utility to verify postgres socket is ready for traffic
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # Cache & Broker Service (Redis 7)
  # ==========================================
  redis:
    image: redis:7-alpine
    container_name: ecommerce_redis
    restart: always
    volumes:
      # Named volume for cache replication state persistence
      - redis_data:/data
    healthcheck:
      # Use redis-cli to send a ping request and expect a PONG reply
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # FastAPI Web Backend Application
  # ==========================================
  backend:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: ecommerce-backend:latest
    container_name: ecommerce_backend
    restart: always
    command: gunicorn -c gunicorn_conf.py app.main:app
    volumes:
      # Mount application directory for code reloading if needed
      - ./Backend:/app
      - uploads_volume:/app/uploads
      - invoices_volume:/app/invoices
    ports:
      # Expose backend API to host network
      - "${BACKEND_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Use internal Docker container names for service connections
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      # Probe the FastAPI application health route via standard Python client libraries
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 1024M

  # ==========================================
  # Celery Background Worker
  # ==========================================
  celery-worker:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: ecommerce-backend:latest
    container_name: ecommerce_celery_worker
    restart: always
    # Listens to all task queues: high priority, default, and low priority
    command: celery -A app.tasks.celery_worker.celery worker -Q high_priority,default,low_priority -c 4 --loglevel=info
    volumes:
      - ./Backend:/app
      - uploads_volume:/app/uploads
      - invoices_volume:/app/invoices
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M

  # ==========================================
  # Celery Beat Scheduler
  # ==========================================
  celery-beat:
    build:
      context: ./Backend
      dockerfile: Dockerfile
    image: ecommerce-backend:latest
    container_name: ecommerce_celery_beat
    restart: always
    # Triggers background cron and interval tasks
    command: celery -A app.tasks.celery_worker.celery beat --loglevel=info
    volumes:
      - ./Backend:/app
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

  # ==========================================
  # React Frontend served via Nginx
  # ==========================================
  frontend:
    build:
      context: ./Frontend
      dockerfile: Dockerfile
    image: ecommerce-frontend:latest
    container_name: ecommerce_frontend
    restart: always
    ports:
      # Expose Nginx frontend to host network
      - "${FRONTEND_PORT:-80}:8080"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # Query the public index route via Nginx
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - ecommerce_network
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: '0.25'
          memory: 256M

# ==========================================
# Named Volumes Configuration
# ==========================================
volumes:
  postgres_data:
  redis_data:
  uploads_volume:
  invoices_volume:

# ==========================================
# Isolated Networks Configuration
# ==========================================
networks:
  ecommerce_network:
    driver: bridge
